<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
  // Nuke stale service worker caches so CSS/JS updates take effect
  if ('caches' in window) caches.keys().then(function(ks) { ks.forEach(function(k) { caches.delete(k); }); });
  if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(regs) { regs.forEach(function(r) { r.unregister(); }); });
  </script>
  <title>Nexus — Your Evolution Hub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c6ff7">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');">&#9776;</button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show');"></div>
  <nav id="sidebar">
    <div class="logo">
      <span class="logo-icon">&#9670;</span>
      <span class="logo-text">Nexus</span>
    </div>
    <ul id="nav-links">
      <li data-view="dashboard" class="active">
        <span class="nav-icon">&#9633;</span> Dashboard
      </li>
      <li data-view="today">
        <span class="nav-icon">&#9788;</span> Today
      </li>
      <li data-view="capture">
        <span class="nav-icon">&#9889;</span> Capture
      </li>
      <li data-view="tasks">
        <span class="nav-icon">&#10003;</span> Tasks
      </li>
      <li data-view="journal">
        <span class="nav-icon">&#9998;</span> Journal
      </li>
      <li data-view="vault">
        <span class="nav-icon">&#128218;</span> Vault
      </li>
      <li data-view="growth">
        <span class="nav-icon">&#128200;</span> Growth
      </li>
      <li data-view="strategy" class="nav-strategy">
        <span class="nav-icon">&#127919;</span> Strategy
      </li>
      <li data-view="calendar">
        <span class="nav-icon">&#128197;</span> Calendar
      </li>
      <li data-view="shortcuts">
        <span class="nav-icon">&#63;</span> Shortcuts
      </li>
      <li data-view="settings">
        <span class="nav-icon">&#9881;</span> Settings
      </li>
    </ul>
    <div class="sidebar-footer">
      <button id="theme-toggle" title="Toggle light/dark theme" onclick="App.toggleTheme()">
        <span class="theme-toggle-icon">&#9790;</span>
        <span class="theme-toggle-label">Dark mode</span>
        <span class="theme-toggle-switch"><span class="theme-toggle-knob"></span></span>
      </button>
      <input type="file" id="import-file" accept=".json" hidden>
      <input type="file" id="checklist-upload-file" accept=".md,.txt" hidden>
    </div>
  </nav>

  <main id="content">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--text-dim,#888);">
      <div style="font-size:36px; margin-bottom:12px;">&#9670;</div>
      <div style="font-size:14px;">Loading Nexus...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="app.js?v=3"></script>
</body>
</html>
